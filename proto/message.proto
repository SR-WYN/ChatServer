syntax = "proto3";

package message;

service VerifyService {
  rpc GetVerifyCode (GetVerifyReq) returns (GetVerifyRsp) {}
}

message GetVerifyReq {
  string email = 1;
}

message GetVerifyRsp {
  int32 error = 1;
  string email = 2;
  string code = 3;
}

message GetChatServerReq {
  int32 uid = 1;
}

message GetChatServerRsp {
  int32 error = 1;
  string host = 2;
  string port = 3;
  string token = 4;
}

message LoginReq {
  int32 uid = 1;
  string token = 2;
}

message LoginRsp {
  int32 error = 1;
  int32 uid = 2;
  string token = 3;
}

message RegisterNodeReq {
  string name = 1;
  string client_host = 2;
  string client_port = 3;
  string rpc_host = 4;
  string rpc_port = 5;
  string instance_id = 6;
}

message RegisterNodeRsp {
  int32 error = 1;
  string name = 2;
}

message UnregisterNodeReq {
  string name = 1;
  string instance_id = 2;
}

message UnregisterNodeRsp {
  int32 error = 1;
}

message HeartbeatNodeReq {
  string name = 1;
  string instance_id = 2;
}

message HeartbeatNodeRsp {
  int32 error = 1;
}

message GetUserNodeReq {
  int32 uid = 1;
}

message GetUserNodeRsp {
  int32 error = 1;
  string node_name = 2;
  string rpc_host = 3;
  string rpc_port = 4;
  string client_host = 5;
  string client_port = 6;
}

message GetNodeReq {
  string name = 1;
}

message GetNodeRsp {
  int32 error = 1;
  string name = 2;
  string rpc_host = 3;
  string rpc_port = 4;
  string client_host = 5;
  string client_port = 6;
}

message BindUserToNodeReq {
  int32 uid = 1;
  string node_name = 2;
}

message BindUserToNodeRsp {
  int32 error = 1;
}

message UnbindUserReq {
  int32 uid = 1;
}

message UnbindUserRsp {
  int32 error = 1;
}

message ValidateTokenReq {
  int32 uid = 1;
  string token = 2;
}

message ValidateTokenRsp {
  int32 error = 1;
  int32 uid = 2;
}

service StatusService {
  rpc GetChatServer (GetChatServerReq) returns (GetChatServerRsp);
  rpc Login(LoginReq) returns(LoginRsp);
  rpc RegisterNode(RegisterNodeReq) returns (RegisterNodeRsp);
  rpc UnregisterNode(UnregisterNodeReq) returns (UnregisterNodeRsp);
  rpc HeartbeatNode(HeartbeatNodeReq) returns (HeartbeatNodeRsp);
  rpc GetUserNode(GetUserNodeReq) returns (GetUserNodeRsp);
  rpc GetNode(GetNodeReq) returns (GetNodeRsp);
  rpc BindUserToNode(BindUserToNodeReq) returns (BindUserToNodeRsp);
  rpc UnbindUser(UnbindUserReq) returns (UnbindUserRsp);
  rpc ValidateToken(ValidateTokenReq) returns (ValidateTokenRsp);
}

message AddFriendReq {
  int32 applyuid = 1;
  string name = 2;
  string desc = 3;
  int32 touid = 4;
  string icon = 5;
  int32 sex = 6;
  string nick = 7;
  string alias_name = 8;
}

message AddFriendRsp {
  int32 error = 1;
  int32 applyuid = 2;
  int32 touid = 3;
}

message ReplyFriendReq {
  int32 replyuid = 1;
  bool agree = 2;
  int32 touid = 3;
}

message ReplyFriendRsp {
  int32 error = 1;
  int32 replyuid = 2;
  int32 touid = 3;
}

message SendChatMsgReq {
  int32 fromuid = 1;
  int32 touid = 2;
  string message = 3;
}

message SendChatMsgRsp {
  int32 error = 1;
  int32 fromuid = 2;
  int32 touid = 3;
}

message AuthFriendReq {
  int32 fromuid = 1;
  int32 touid = 2;
}

message AuthFriendRsp {
  int32 error = 1;
  int32 fromuid = 2;
  int32 touid = 3;
}

message TextChatMsgReq {
  int32 fromuid = 1;
  int32 touid = 2;
  repeated TextChatData textmsgs = 3;
}

message TextChatData {
  string msgid = 1;
  string msgcontent = 2;
}

message TextChatMsgRsp {
  int32 error =1;
  int32 fromuid = 2;
  int32 touid=3;
  repeated TextChatData textmsgs =4;
  bool recipient_online = 5;
}

service ChatService {
  rpc NotifyAddFriend(AddFriendReq) returns (AddFriendRsp);
  rpc ReplyAddFriend(ReplyFriendReq) returns(ReplyFriendRsp);
  rpc SendChatMsg(SendChatMsgReq) returns(SendChatMsgRsp);
  rpc NotifyAuthFriend(AuthFriendReq) returns(AuthFriendRsp);
  rpc NotifyTextChatMsg(TextChatMsgReq) returns(TextChatMsgRsp);
}